spring:
  application:
    name: connecthub-gateway
server:
  port: 8080
logging:
  level:
    root: INFO
    com.connecthub.gateway: INFO
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
